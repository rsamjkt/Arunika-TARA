# APM (T.A.R.A) — config template
#
# Copy ke config.toml lalu isi nilai yang sesuai environment Anda.
# JANGAN PERNAH commit config.toml (.gitignore sudah block).
#
# Di Windows production, jalankan `apm.exe --encrypt-config` setelah copy
# untuk meng-enkripsi credential dengan Windows DPAPI + AES-256-GCM.
# Field bersuffix _enc menerima nilai plaintext (akan dienkripsi otomatis)
# atau format "ENC:<base64>" hasil enkripsi.

[app]
idle_timeout_sec = 60
log_level        = "info"          # debug | info | warn | error
log_dir          = "./logs"
timezone         = "Asia/Jakarta"
version          = "1.0.0"

[server]
# SIMRS Khanza — Direct MySQL mode (mengikuti pola anjunganmandiriSEP).
# Kosongkan khanza_url; isi khanza_dsn dengan Go MySQL DSN.
khanza_url        = ""
khanza_api_key    = ""
khanza_dsn        = "rs4m:aPDXw64Bri8hHY8V0bIt@tcp(10.0.2.121:3306)/sikrsam260312?parseTime=true&loc=Local&timeout=5s"
khanza_kd_pj_umum = "A03"
khanza_kd_pj_bpjs = "BPJ"
timeout_ms        = 5000
retry             = 2

[bpjs]
# VClaim — production: https://apijkn.bpjs-kesehatan.go.id/vclaim-rest/
# VClaim — development: https://dvlp.bpjs-kesehatan.go.id/vclaim-rest/
vclaim_url           = "https://dvlp.bpjs-kesehatan.go.id/vclaim-rest/"
cons_id              = "REPLACE_WITH_CONS_ID"
consumer_secret      = "REPLACE_WITH_CONSUMER_SECRET"
antrol_url           = "https://apijkn.bpjs-kesehatan.go.id/antrean-rest/"
detector_timeout_ms  = 5000        # Smart Detector parallel-check timeout
ppk_pelayanan        = "REPLACE_WITH_PPK_RS"  # kode faskes RS — masuk ke t_sep.ppkPelayanan
mock                 = true        # dev: pakai NewMockPreset(), skip BPJS dvlp network

[fingerprint]
# After.exe — Aplikasi Sidik Jari BPJS Kesehatan (Windows only).
# Verify path di kiosk:
#   PowerShell: Get-ChildItem "C:\Program Files*" -Recurse -Filter "After.exe" -EA 0
exe_path           = "C:\\Program Files (x86)\\Aplikasi Sidik Jari BPJS Kesehatan\\After.exe"
# REST endpoint lokal After.exe (port default 6080 di After versi baru,
# kalau ga tau biarkan https BPJS — kalau gagal call, log akan jelas).
rest_url           = "https://fp.bpjs-kesehatan.go.id/finger-rest/"
# Kredensial After.exe (sama dengan Frista — akun BPJS petugas).
username_enc       = "REPLACE_WITH_FP_USERNAME"
password_enc       = "REPLACE_WITH_FP_PASSWORD"
scan_timeout_sec   = 30
poll_interval_ms   = 500
# Delay setelah spawn After.exe sebelum inject login. After.exe lebih
# cepat dari Frista — 3 detik default cukup.
startup_delay_sec  = 3
# Class names dialog login (opsional). Default TfrmLogin/TEdit/TButton.
window_class_login   = ""
window_class_edit    = ""
window_class_button  = ""

[frista]
# Frista — Aplikasi Sidik Wajah BPJS Kesehatan (Windows only).
# Path executable hasil install Frista. Verify di kiosk:
#   PowerShell: Get-Command frista.exe | Select Source
# Atau cari di folder Program Files / Program Files (x86).
exe_path           = "C:\\Program Files\\Frista\\frista.exe"
# REST URL Frista lokal (kalau Frista versi baru expose API). Sementara
# tidak dipakai — vendor pattern Robot+Clipboard yang dipakai. Biarkan
# kosong atau diisi placeholder.
rest_url           = ""
# Kredensial login Frista (sama dengan akun BPJS yang petugas pakai
# untuk login Frista manual). Plaintext akan otomatis di-encrypt
# pertama kali apm.exe jalan dengan master key Windows DPAPI.
username_enc       = "REPLACE_WITH_FRISTA_USERNAME"
password_enc       = "REPLACE_WITH_FRISTA_PASSWORD"
# Timeout total scan (vendor pattern: spawn → login → paste → user scan
# → token submit ke BPJS). 30 detik biasanya cukup.
scan_timeout_sec   = 30
poll_interval_ms   = 500
# Delay setelah spawn frista.exe sebelum mulai inject keystroke.
# Vendor pakai 5500ms (Thread.sleep 5000+500). Kalau kiosk lambat,
# naikkan ke 8.
startup_delay_sec  = 5
# Class names dialog login Frista untuk Win32 UI Automation (opsional).
# Default Delphi VCL (TfrmLogin/TEdit/TButton) — APM sekarang pakai
# clipboard+SendInput, tidak butuh class names. Biarkan kosong.
window_class_login   = ""
window_class_edit    = ""
window_class_button  = ""

[printer]
# Mode: "console" (Mac dev — print ke stdout) | "escpos_usb" | "escpos_serial" | "escpos_network"
mode      = "console"
port      = "POS-58"               # nama printer (USB) / COM port (serial) / IP:port (network)
width_mm  = 58                     # 58 atau 80

[antrian]
loket_prefix = "A"
poli_prefix  = "B"
umum_prefix  = "C"
reset_time   = "00:01"             # HH:MM WIB — reset counter harian

[admin]
# PIN 4-6 digit untuk akses admin panel kiosk. Plaintext untuk
# kemudahan dev — production hashing dapat ditambah di P-051.
# Kosongkan kalau panel admin TIDAK dilindungi PIN.
pin = "1234"

[update]
# Auto-update dari GitHub Releases. Kalau enabled, kiosk cek release
# baru saat startup + (opsional) interval. Token PAT (Personal Access
# Token) read-only ke repo private; rotate setiap 6-12 bulan.
enabled               = true
repo                  = "rsamjkt/Arunika-TARA"
github_token          = "REPLACE_WITH_GITHUB_PAT"   # ghp_... atau github_pat_...
check_on_startup      = true
auto_apply            = false                       # true = countdown 30s lalu auto-restart
check_interval_hours  = 24                          # 0 = off (cuma startup check)
asset_pattern         = "apm-windows-amd64.exe"     # nama asset di release page

[dev]
# Hanya berlaku di non-Windows (Mac/Linux). Hardware otomatis di-mock.
mock_hardware    = true
mock_server_port = 9090
