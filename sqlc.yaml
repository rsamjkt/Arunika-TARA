version: "2"
sql:
  - engine: "sqlite"
    schema: "migrations/001_initial.sql"
    queries: "internal/store/query.sql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
