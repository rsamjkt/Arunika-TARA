# APM (T.A.R.A) — config template
#
# Copy ke config.toml lalu isi nilai yang sesuai environment Anda.
# JANGAN PERNAH commit config.toml (.gitignore sudah block).
#
# Di Windows production, jalankan `apm.exe --encrypt-config` setelah copy
# untuk meng-enkripsi credential dengan Windows DPAPI + AES-256-GCM.
# Field bersuffix _enc menerima nilai plaintext (akan dienkripsi otomatis)
# atau format "ENC:<base64>" hasil enkripsi.

[app]
idle_timeout_sec = 60
log_level        = "info"          # debug | info | warn | error
log_dir          = "./logs"
timezone         = "Asia/Jakarta"
version          = "1.0.0"

[branding]
# Identitas visual RS yang ditampilkan di kiosk.
# Logo: file PNG/SVG/JPG/WebP. Path absolut atau relatif ke working dir.
# Kosongkan logo_path → pakai default mark "T" generik.
logo_path          = ""             # mis. "./assets/logo-rs.png"
hospital_name      = "Rumah Sakit Anggrek Mas"
hospital_tagline   = "Anjungan Pasien Mandiri"

# Theme color CSS (hex). Default biru korporat T.A.R.A — ganti ke
# warna identitas RS-mu. Dipakai untuk hero buttons, badges, accent.
# Contoh:
#   biru korporat: "#1B4FD8"  (default)
#   teal RS Anggrek Mas: "#00897B"
#   hijau medis: "#0F766E"
#   merah RS: "#DC2626"
primary_color      = "#1B4FD8"
primary_color_dark = ""             # kosong = auto-darken 12%
accent_color       = ""             # kosong = derive dari primary

# Logo BPJS Kesehatan untuk pasien BPJS — opsional override.
# Default: SVG inline yang sudah dibundle (lihat BpjsLogo.vue).
# Set kalau RS punya file logo BPJS resmi dari brosur cabang BPJS.
bpjs_logo_path     = ""             # mis. "./assets/logo-bpjs.png"

[audio]
# Audio cue (tap sound, success chime, error tone).
# Disable kalau kiosk di environment yang sudah ramai (audio bukan tambahan info).
enabled = true
volume  = 0.6                       # 0.0 (mute) – 1.0 (max)

[server]
# SIMRS Khanza — Direct MySQL mode (mengikuti pola anjunganmandiriSEP).
# Kosongkan khanza_url; isi khanza_dsn dengan Go MySQL DSN.
#
# Format DSN: user:password@tcp(host:port)/database?parseTime=true&loc=Local&timeout=5s
# Kalau dimulai dengan "ENC:" → akan didekripsi via master key OS.
khanza_url        = ""
khanza_api_key    = ""
khanza_dsn        = "user:password@tcp(IP_KHANZA:3306)/nama_db?parseTime=true&loc=Local&timeout=5s"
khanza_kd_pj_umum = "A03"          # cek tabel penjab — kode penjamin Umum/Tunai RS-mu
khanza_kd_pj_bpjs = "BPJ"          # kode penjamin BPJS RS-mu
timeout_ms        = 5000
retry             = 2

[bpjs]
# VClaim — production: https://apijkn.bpjs-kesehatan.go.id/vclaim-rest/
# VClaim — development: https://dvlp.bpjs-kesehatan.go.id/vclaim-rest/
vclaim_url           = "https://apijkn.bpjs-kesehatan.go.id/vclaim-rest/"
cons_id              = "REPLACE_WITH_CONS_ID"
consumer_secret      = "REPLACE_WITH_CONSUMER_SECRET"
user_key             = "REPLACE_WITH_USER_KEY"   # wajib untuk decrypt response BPJS
antrol_url           = "https://apijkn.bpjs-kesehatan.go.id/antrean-rest/"
detector_timeout_ms  = 5000        # Smart Detector parallel-check timeout

# Mock VClaim — hanya untuk dev/test tanpa hit real BPJS API.
# true  → pakai canned response (lihat internal/integration/vclaim/mock_preset.go).
#         Identifier prefix akan trigger scenario berbeda:
#           "INVALID..."   → error (test error path)
#           "INACTIVE..."  → peserta tidak aktif
#           "MJKN..."      → peserta aktif (test MJKN flow)
#           "KONTROL..."   → peserta aktif + ada SKDP (test Kontrol flow)
#           default        → peserta aktif (RujukanBaru flow)
# false → pakai real VClaim client (production).
mock                 = false

[fingerprint]
# After.exe — Aplikasi Sidik Jari BPJS Kesehatan (Windows only — di Mac otomatis pakai mock)
exe_path           = "C:\\Program Files (x86)\\Aplikasi Sidik Jari BPJS Kesehatan\\After.exe"
rest_url           = "http://localhost:9999/finger-rest/"   # internal After.exe REST port
username_enc       = "REPLACE_WITH_FP_USERNAME"             # plaintext OK, atau "ENC:..." kalau encrypted
password_enc       = "REPLACE_WITH_FP_PASSWORD"
scan_timeout_sec   = 30
poll_interval_ms   = 500

# UI Automation — class names dialog login After.exe (Win32 SendMessageW
# injection). Default Delphi VCL standar — biasanya cukup. Override hanya
# kalau RS pakai versi non-standar (verify dengan Spy++).
window_class_login    = "TfrmLogin"
window_class_edit     = "TEdit"
window_class_button   = "TButton"
startup_delay_sec     = 3          # tunggu setelah spawn sebelum inject login

[frista]
# Frista card reader (Windows only — di Mac otomatis pakai mock).
# Aplikasi spawn headless (CREATE_NO_WINDOW), auto-login, lalu APM
# polling clipboard untuk capture data kartu yang Frista tulis.
exe_path          = "C:\\Program Files\\Frista\\frista.exe"
username_enc      = "REPLACE_WITH_FRISTA_USERNAME"
password_enc      = "REPLACE_WITH_FRISTA_PASSWORD"
read_timeout_ms   = 1000
restart_on_crash  = true

# UI Automation — sama seperti fingerprint (default Delphi VCL).
window_class_login    = "TfrmLogin"
window_class_edit     = "TEdit"
window_class_button   = "TButton"
startup_delay_sec     = 5          # Frista lebih lambat dari After.exe

# Polling clipboard untuk capture card scan data.
poll_interval_ms      = 500

[printer]
# Mode pilihan:
#   "escpos_usb"     → USB printer thermal (default untuk kiosk Windows)
#   "escpos_serial"  → Serial / RS232 (atau USB-to-Serial adapter)
#   "escpos_network" → Network printer (LAN/Wi-Fi, port 9100 standar)
#   "console"        → output ke stdout (untuk dev tanpa printer)
#
# Default: USB POS-58 thermal printer (yang paling umum di kiosk RS Indonesia).
# Mac/Linux dev: mode apapun di sini OTOMATIS jadi console (lihat
# provider.go) — kiosk tetap jalan tanpa printer fisik.
mode      = "escpos_usb"
port      = "POS-58"               # USB: nama printer dari `Get-Printer` Windows
                                   # Serial: COM3 / /dev/cu.usbserial-A1234
                                   # Network: 192.168.1.50:9100
width_mm  = 58                     # 58 atau 80, sesuai printer thermal Anda

[antrian]
loket_prefix = "A"
poli_prefix  = "B"
umum_prefix  = "C"
reset_time   = "00:01"             # HH:MM WIB — auto-reset counter harian

[admin]
# PIN 4-6 digit untuk akses admin panel kiosk. Plaintext untuk
# kemudahan dev — production hashing dapat ditambah di P-051.
# Kosongkan kalau panel admin TIDAK dilindungi PIN.
pin = "1234"

[dev]
# Hanya berlaku di non-Windows (Mac/Linux). Hardware otomatis di-mock.
mock_hardware    = true
mock_server_port = 9090
